<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bichou Messenger</title>
    <meta
      name="description"
      content="Bichou Messenger, chat instantane statique par code de session."
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="join-panel" id="joinPanel" aria-labelledby="joinTitle">
        <div class="brand-row">
          <div class="brand-mark" aria-hidden="true">bm</div>
          <div>
            <p class="brand-name">bichou messenger</p>
            <h1 id="joinTitle">Chat instantane</h1>
            <p>Un salon temporaire, un code partage, une discussion directe.</p>
          </div>
        </div>

        <form class="session-form" id="sessionForm">
          <label for="sessionCode">Code de session</label>
          <div class="code-row">
            <input
              id="sessionCode"
              name="sessionCode"
              type="text"
              inputmode="latin"
              autocomplete="off"
              spellcheck="false"
              maxlength="32"
              placeholder="ex: LUNE-4821"
            />
            <button type="button" class="icon-button" id="randomCodeButton" title="Generer un code">
              R
            </button>
          </div>
          <button type="submit" class="primary-button">Entrer dans la session</button>
        </form>

        <p class="privacy-note">
          Les messages restent dans les navigateurs connectes. Fermer l'onglet efface la discussion.
        </p>
      </section>

      <section class="chat-panel hidden" id="chatPanel" aria-label="Discussion">
        <header class="chat-header">
          <div class="chat-title">
            <span class="mini-logo" aria-hidden="true">bm</span>
            <div>
              <span class="eyebrow">Session</span>
              <h2 id="roomLabel">...</h2>
            </div>
          </div>
          <div class="header-actions">
            <button type="button" class="secondary-button" id="copyLinkButton">Copier le lien</button>
            <button type="button" class="ghost-button" id="leaveButton">Quitter</button>
          </div>
        </header>

        <div class="status-bar" id="statusBar" role="status">
          Connexion au salon...
        </div>

        <ol class="messages" id="messages" aria-live="polite"></ol>

        <form class="composer" id="messageForm">
          <div class="reply-preview hidden" id="replyPreview">
            <div>
              <span id="replyAuthor">Message</span>
              <p id="replyText"></p>
            </div>
            <button type="button" id="cancelReplyButton" title="Annuler la reponse">x</button>
          </div>
          <div class="emoji-wrap">
            <button type="button" class="emoji-button" id="emojiButton" title="Ajouter un emoji">
              :)
            </button>
            <div class="emoji-picker hidden" id="emojiPicker" aria-label="Emojis"></div>
          </div>
          <textarea
            id="messageInput"
            name="messageInput"
            rows="1"
            maxlength="1200"
            placeholder="Ecrire un message..."
            aria-label="Message"
          ></textarea>
          <button type="submit" class="send-button" id="sendButton" title="Envoyer">
            &gt;
          </button>
        </form>
      </section>
    </main>

    <template id="messageTemplate">
      <li class="message">
        <div class="bubble">
          <div class="quoted-message hidden">
            <span class="quoted-author"></span>
            <p class="quoted-text"></p>
          </div>
          <p class="message-text"></p>
          <div class="message-meta">
            <button type="button" class="reply-button">Repondre</button>
            <time class="message-time"></time>
          </div>
        </div>
      </li>
    </template>

    <script type="module" src="./app.js"></script>
  </body>
</html>
